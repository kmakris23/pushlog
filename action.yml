name: Pushlog AI Generator
description: Generates an AI-powered changelog from commits and code changes and posts it to Slack
author: kmakris23

inputs:
  slack_webhook:
    description: Slack webhook URL
    required: true

  openai_api_key:
    description: OpenAI API key
    required: true

  branch:
    description: Branch to monitor
    required: true

  language:
    description: Language code for the changelog (e.g. en, el, fr, de)
    required: false
    default: en

  openai_model:
    description: OpenAI model to use for changelog generation
    required: false
    default: gpt-4.1

  openai_temperature:
    description: Sampling temperature for changelog generation
    required: false
    default: '0.1'

  openai_max_output_tokens:
    description: Maximum number of output tokens to generate
    required: false
    default: '800'

  slack_title:
    description: Title for the Slack message
    required: false
    default: Repository Update

  slack_mentions:
    description: Slack mentions to include (e.g. <!channel>, <!here>, <@U012345>)
    required: false
    default: ''

  user_prompt:
    description: Optional freeform user instructions for changelog generation. Commit and diff context are always included automatically
    required: false
    default: ''

  system_prompt:
    description: Optional system prompt override for changelog generation. Language is still injected automatically
    required: false
    default: ''

branding:
  icon: arrow-up-circle
  color: red

runs:
  using: docker
  image: Dockerfile
